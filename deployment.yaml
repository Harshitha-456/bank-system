apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bank-system
  template:
    metadata:
      labels:
        app: bank-system
    spec:
      containers:
      - name: bank-system
        image: harshitha456/bank-system:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bank-service
spec:
  type: NodePort
  selector:
    app: bank-system
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007